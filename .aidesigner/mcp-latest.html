<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GNNBindOptimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:['"Space Grotesk"','sans-serif'],serif:['"Instrument Serif"','serif']},colors:{teal:{900:'#193a3b',700:'#235052',500:'#347a7b',100:'#e0f0f0'},cream:{500:'#f7f0e8',400:'#fcfaf8'}},borderRadius:{'4xl':'28px'}}}}</script>
    <style>
    .glass-card{background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.6)}
    .mol-gradient{background:linear-gradient(135deg,#fbfcfe 0%,#eef3f8 100%)}
    </style>
</head>
<body class="bg-cream-500 font-sans text-teal-900 h-screen overflow-hidden flex antialiased">
<aside class="w-72 bg-teal-900 text-white flex flex-col h-full shrink-0">
    <div class="px-8 py-10 flex items-center gap-3">
        <h1 class="font-bold text-xl">GNN<span class="font-serif italic text-teal-100 font-normal">Bind</span>Opt</h1>
    </div>
    <nav class="flex-1 px-4 space-y-1">
        <a href="#" class="flex items-center gap-3 px-4 py-3 bg-teal-700/50 text-white rounded-2xl font-medium">Dashboard</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-teal-100/70 hover:bg-teal-700/30 rounded-2xl">Binding Predictor</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-teal-100/70 hover:bg-teal-700/30 rounded-2xl">RL Browser</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-teal-100/70 hover:bg-teal-700/30 rounded-2xl">GNN vs Vina</a>
        <a href="#" class="flex items-center gap-3 px-4 py-3 text-teal-100/70 hover:bg-teal-700/30 rounded-2xl">SQL Console</a>
    </nav>
</aside>
<main class="flex-1 h-full overflow-y-auto p-8 bg-cream-500">
    <div class="grid grid-cols-12 gap-6">
        <div class="col-span-7 glass-card rounded-4xl p-2 h-96 flex">
            <div class="w-full h-full mol-gradient rounded-3xl flex items-center justify-center">
                <svg viewBox="0 0 200 200" class="w-56 h-56" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M100 50 L140 73 L140 120 L100 143 L60 120 L60 73 Z" stroke="#193a3b" stroke-width="3" stroke-linejoin="round"/>
                    <path d="M60 120 L30 140 M140 120 L170 140 M100 143 L100 175" stroke="#193a3b" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="100" cy="50" r="6" fill="#fbfcfe" stroke="#193a3b" stroke-width="3"/>
                    <circle cx="60" cy="73" r="6" fill="#fbfcfe" stroke="#193a3b" stroke-width="3"/>
                    <circle cx="140" cy="73" r="6" fill="#fbfcfe" stroke="#193a3b" stroke-width="3"/>
                    <circle cx="60" cy="120" r="6" fill="#fbfcfe" stroke="#193a3b" stroke-width="3"/>
                    <circle cx="140" cy="120" r="6" fill="#fbfcfe" stroke="#193a3b" stroke-width="3"/>
                    <circle cx="100" cy="143" r="6" fill="#fbfcfe" stroke="#193a3b" stroke-width="3"/>
                    <text x="25" y="150" font-family="Space Grotesk" font-size="12" fill="#193a3b" font-weight="bold">OH</text>
                    <text x="170" y="150" font-family="Space Grotesk" font-size="12" fill="#E85D04" font-weight="bold">NH₂</text>
                </svg>
            </div>
        </div>
        <div class="col-span-5 flex flex-col gap-4">
            <div class="glass-card rounded-3xl p-6 flex-1 border-l-4 border-l-teal-500">
                <div class="text-xs text-teal-900/60 uppercase tracking-widest mb-1">Predicted pKd</div>
                <div class="text-4xl font-bold font-mono">7.49</div>
            </div>
            <div class="glass-card rounded-3xl p-6 flex-1 border-l-4 border-l-orange-400">
                <div class="text-xs text-teal-900/60 uppercase tracking-widest mb-1">QED Score</div>
                <div class="text-4xl font-bold font-mono">0.82</div>
            </div>
            <div class="glass-card rounded-3xl p-6 flex-1 border-l-4 border-l-green-500">
                <div class="text-xs text-teal-900/60 uppercase tracking-widest mb-1">SA Score</div>
                <div class="text-4xl font-bold font-mono">3.14</div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
